# Test production Docker images locally before deploying to Azure.
#
# Prerequisites:
#   cp .env.example .env   (fill in API keys)
#   docker compose up --build
#
# App:     http://localhost:3000
# Agent:   http://localhost:8000/copilotkit/health
# Backend: http://localhost:8001/health

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      FASTAPI_PORT: "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LANGGRAPH_AGENT_PORT: "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/copilotkit/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FASTAPI_BASE_URL: http://backend:8001
      LANGGRAPH_AGENT_URL: http://agent:8000/copilotkit
      NEXT_PUBLIC_LANGGRAPH_AGENT_ID: dashboard_agent
    depends_on:
      backend:
        condition: service_healthy
      agent:
        condition: service_healthy
